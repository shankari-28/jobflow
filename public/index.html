<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Distributed Job Scheduler — Premium Dashboard" />
  <title>JobFlow — Distributed Job Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  AUTH OVERLAY                                              -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="auth-overlay" class="hidden">
  <div class="auth-card" id="auth-card-container">
    <!-- Injected by auth.js -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  TOAST CONTAINER                                           -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  MODAL BACKDROP                                            -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="modal-backdrop">
  <div class="modal" id="modal-container">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Modal</h2>
      <button class="modal-close" onclick="App.closeModal()" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  SIDE DRAWER                                               -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="side-drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Details</span>
    <button class="modal-close" onclick="App.closeDrawer()" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  APP SHELL                                                  -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="sidebar-logo-text">JobFlow</span>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="nav-section-label">Main</div>

      <div class="nav-item active" data-page="overview" title="Overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Overview</span>
      </div>

      <div class="nav-item" data-page="queues" title="Queues">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        <span class="nav-label">Queues</span>
      </div>

      <div class="nav-item" data-page="jobs" title="Jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <path d="M12 12v4M10 14h4"/>
        </svg>
        <span class="nav-label">Jobs</span>
      </div>

      <div class="nav-section-label">Monitor</div>

      <div class="nav-item" data-page="workers" title="Workers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span class="nav-label">Workers</span>
      </div>

      <div class="nav-item" data-page="logs" title="Execution Logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="nav-label">Logs</span>
      </div>

      <div class="nav-item" data-page="dlq" title="Dead Letter Queue" id="dlq-nav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span class="nav-label">DLQ</span>
        <span class="nav-badge hidden" id="dlq-badge">0</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <!-- User info -->
      <div class="nav-item" id="user-nav-item" style="margin-bottom:4px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label" id="nav-username" style="font-size:13px;color:var(--text-secondary);">User</span>
      </div>

      <div class="nav-item" id="logout-nav" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-label">Logout</span>
      </div>

      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <svg id="toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ──────────────────────────────────────────── -->
  <main id="main-content">
    <!-- Page Header -->
    <header id="page-header">
      <button id="mobile-menu-btn" style="display:none; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; padding:4px; margin-right:8px;" onclick="App.toggleMobileSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div>
        <div class="page-title" id="header-title">Overview</div>
        <div class="page-subtitle" id="header-subtitle">Platform health at a glance</div>
      </div>
      <div class="header-spacer"></div>
      <div class="live-indicator" id="live-indicator">
        <div class="live-dot"></div>
        <span>Live</span>
      </div>
      <div style="font-size:12px; color:var(--text-muted); padding-left:16px;" id="current-time"></div>
    </header>

    <!-- Page Content (rendered by JS) -->
    <div id="page-content"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  SCRIPTS (order matters)                                   -->
<!-- ═══════════════════════════════════════════════════════════ -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/queues.js"></script>
<script src="js/jobs.js"></script>
<script src="js/workers.js"></script>
<script src="js/executions.js"></script>
<script src="js/dlq.js"></script>

</body>
</html>
